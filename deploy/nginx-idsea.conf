server {
    listen 80;
    server_name idsea.in www.idsea.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name idsea.in www.idsea.in;

    ssl_certificate /etc/letsencrypt/live/idsea.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/idsea.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25M;
    root /var/www/idsea/frontend/build;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # API → FastAPI backend (^~ stops regex from stealing /api/ requests)
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8003/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        proxy_request_buffering off;
        proxy_buffering off;
        client_max_body_size 25M;
    }

    # Uploaded files fallback
    location ^~ /uploads/ {
        alias /var/www/idsea/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Cache static frontend assets (no png/jpg - those go through /api/)
    location ~* \.(js|css|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
